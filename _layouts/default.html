<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include head.html %}
</head>
<body>
  <div id="progress-bar" aria-hidden="true"></div>

  {% include header.html %}

  <main class="page" id="main">
    <div class="page-inner">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</span>
      <span class="footer-built">
        静态博客 · Powered by <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
      </span>
    </div>
  </footer>

  <button id="back-to-top" title="回到顶部" aria-label="回到顶部" class="back-to-top">
    <svg class="progress-ring" width="42" height="42" viewBox="0 0 42 42" aria-hidden="true">
      <circle class="progress-ring-track" cx="21" cy="21" r="18" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle class="progress-ring-fill"  cx="21" cy="21" r="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="back-to-top-arrow" aria-hidden="true">&uarr;</span>
  </button>
</body>
</html>
