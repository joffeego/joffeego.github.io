<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include head.html %}
</head>
<body>
  <div id="progress-bar" aria-hidden="true"></div>

  {% include header.html %}

  <main class="page" id="main">
    <div class="page-inner">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</span>
      <span class="footer-built">
        静态博客 · Powered by <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
      </span>
    </div>
  </footer>

  <button id="back-to-top" title="回到顶部" aria-label="回到顶部" class="back-to-top">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 14 6-6 6 6"/></svg>
  </button>
</body>
</html>
