<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta name="author" content="{{ site.author.name }}">
<meta name="theme-color" content="#FAF8F4">

<meta property="OG:site_name" content="{{ site.title }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<title>
  {% if page.title and page.layout != 'default' %}
    {{ page.title }} — {{ site.title }}
  {% elsif page.title == '文章' %}
    {{ site.title }}
  {% elsif page.title %}
    {{ page.title }} — {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238B5A3C'/><text x='50' y='70' font-size='54' font-family='Georgia, serif' font-weight='600' fill='white' text-anchor='middle'>J</text></svg>">

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v=20260625d">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<script src="{{ '/assets/js/main.js' | relative_url }}?v=20260625a" defer></script>
</content>
</invoke>
