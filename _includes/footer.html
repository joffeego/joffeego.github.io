<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-col">
      <p>
        &copy; {{ site.time | date: '%Y' }} {{ site.author.name }}.
        Powered by <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
        &amp; <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>.
      </p>
    </div>
    <div class="footer-col footer-social">
      <a href="{{ '/feed.xml' | relative_url }}" title="RSS Feed">
        RSS
      </a>
      {% if site.author.email %}
      <a href="mailto:{{ site.author.email }}" title="Email">
        Email
      </a>
      {% endif %}
    </div>
  </div>
</footer>
