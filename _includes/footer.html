<footer class="site-footer">
  <div class="wrapper">
    <span>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</span>
    <div class="footer-social">
      <a href="{{ '/feed.xml' | relative_url }}" title="RSS">RSS</a>
      <a href="{{ '/search/' | relative_url }}" title="搜索">搜索</a>
      {% if site.author.email %}
      <a href="mailto:{{ site.author.email }}" title="Email">Email</a>
      {% endif %}
    </div>
  </div>
</footer>
