{% assign current_url = page.url | relative_url %}

<aside class="sidebar">
  <div class="sidebar-glow" aria-hidden="true"></div>

  <a href="{{ '/' | relative_url }}" class="sidebar-avatar-link" style="text-decoration:none;">
    <div class="sidebar-avatar">
      <span>{{ site.author.name | slice: 0 | upcase }}</span>
    </div>
  </a>
  <div class="sidebar-name">{{ site.title | escape }}</div>
  <p class="sidebar-bio">{{ site.tagline | default: site.description | truncate: 50 }}</p>

  <nav class="sidebar-nav">
    <a href="{{ '/' | relative_url }}" {% if current_url == '/' %}class="active"{% endif %}>
      <span class="nav-icon">🏠</span><span>文章</span>
    </a>
    <a href="{{ '/categories/' | relative_url }}" {% if current_url contains '/categories/' %}class="active"{% endif %}>
      <span class="nav-icon">📂</span><span>分类</span>
    </a>
    <a href="{{ '/search/' | relative_url }}" {% if current_url contains '/search/' %}class="active"{% endif %}>
      <span class="nav-icon">🔍</span><span>搜索</span>
    </a>
    <a href="{{ '/about/' | relative_url }}" {% if current_url contains '/about/' %}class="active"{% endif %}>
      <span class="nav-icon">👤</span><span>关于</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <a href="https://github.com/joffeego" title="GitHub" target="_blank" rel="noopener" class="social-link">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <a href="{{ '/feed.xml' | relative_url }}" title="RSS" class="social-link">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M3.429 12.571a1.714 1.714 0 100 3.429 1.714 1.714 0 000-3.429zM2 7v2.238a4.762 4.762 0 014.762 4.762H9A7 7 0 002 7zm0-4.571v2.286A8.286 8.286 0 0110.286 13.857H12.57A10.571 10.571 0 002 2.429z"/></svg>
    </a>
    <button id="theme-toggle" class="theme-toggle-sidebar" title="切换主题" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>
  </div>
</aside>
