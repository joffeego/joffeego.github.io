{% assign current_url = page.url | relative_url %}

<header class="site-header">
  <div class="nav-wrapper">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">J</span>
      <span class="brand-name">{{ site.title | escape }}</span>
    </a>

    <nav class="site-nav" aria-label="主导航">
      <a class="nav-link" href="{{ '/' | relative_url }}" {% if current_url == '/' %}aria-current="page"{% endif %}>文章</a>
      <a class="nav-link" href="{{ '/categories/' | relative_url }}" {% if current_url contains '/categories/' %}aria-current="page"{% endif %}>分类</a>
      <a class="nav-link" href="{{ '/about/' | relative_url }}" {% if current_url contains '/about/' %}aria-current="page"{% endif %}>关于</a>
    </nav>

    <nav class="site-nav-right" aria-label="工具">
      <button class="nav-btn" type="button" title="搜索" aria-label="搜索" data-search-trigger>
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="7" cy="7" r="5"/><path d="m11 11 3.5 3.5"/></svg>
      </button>
    </nav>
  </div>
</header>
