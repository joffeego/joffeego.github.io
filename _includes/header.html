<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">&#9776;</span>
      </label>

      <div class="trigger">
        <a class="page-link" href="{{ '/' | relative_url }}">首页</a>
        <a class="page-link" href="{{ '/about/' | relative_url }}">关于</a>
        <a class="page-link" href="{{ '/feed.xml' | relative_url }}">RSS</a>
        {% for page in site.pages %}
          {% if page.title and page.layout == 'default' and page.title != '首页' and page.title != '关于' %}
          <a class="page-link" href="{{ page.url | relative_url }}">{{ page.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
